application:
  environment: !env APP_ENV, dev
  debug: !env APP_DEBUG, true

localization:
  locale: "en"
  supported_locales:
    - "en"
  locale_path: "locale"
  timezone: "America/Montreal"

render:
  engine: "latte"
  directory: "app/Views"
  cache: "cache/latte"
  mode: "always"

leaf:
  name: "Kintsugi"
  version: "0.1.0"
  description: "Atomic, sweeper-proof wallet rescue using EIP-7702."
  github_url: "https://github.com/ophelios-studio/kintsugi"
  content_path: "content"
  output_path: "dist"
  base_url: ""
  production_url: "https://kintsugi.ophelios.com"
  author: "Ophelios Studio"
  author_url: "https://ophelios.com"
  license: "MIT"
  sections:
    getting-started: "Getting Started"
    concepts: "Concepts"
    cli-reference: "CLI Reference"
    ui-walkthrough: "UI Walkthrough"
    asset-support: "Asset Support"
    security: "Security"
    faq: "FAQ"
