<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kintsugi · OG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: "Kashima Brush";
            src: url("/public/assets/fonts/KashimaDemo.woff2") format("woff2");
            font-weight: 400;
            font-style: normal;
            font-display: block;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1200px; height: 630px; }

        body {
            background: oklch(0.975 0.003 250);
            color: oklch(0.24 0.004 250);
            font-family: "Inter", system-ui, sans-serif;
            position: relative;
            overflow: hidden;
            padding: 70px 80px 90px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            isolation: isolate;
        }

        /* Subtle gold dot grid backdrop */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(oklch(0.62 0.14 70 / 0.10) 1.5px, transparent 1.5px);
            background-size: 38px 38px;
            mask-image: radial-gradient(ellipse at center, black 28%, transparent 78%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 28%, transparent 78%);
            z-index: -1;
        }

        /* Giant 金 watermark anchored lower-right */
        .kanji-watermark {
            position: absolute;
            right: -60px;
            bottom: -120px;
            font-family: "Shippori Mincho", serif;
            font-weight: 800;
            font-size: 580px;
            line-height: 1;
            color: oklch(0.62 0.14 70 / 0.06);
            pointer-events: none;
            user-select: none;
            z-index: -1;
        }

        /* Top brand block */
        .brand {
            display: flex;
            align-items: center;
            gap: 22px;
            line-height: 1;
        }
        .brand-mark {
            font-family: "Shippori Mincho", serif;
            font-weight: 700;
            font-size: 78px;
            color: oklch(0.78 0.13 75);
            text-shadow:
                0 0 28px oklch(0.78 0.13 75 / 0.35),
                0 0 6px oklch(0.78 0.13 75 / 0.5);
        }
        .brand-name {
            font-family: "Kashima Brush", "Shippori Mincho", serif;
            font-weight: 400;
            font-size: 96px;
            color: oklch(0.14 0.004 250);
            letter-spacing: 0.005em;
            line-height: 0.92;
        }

        /* Main content stack */
        .content {
            display: flex;
            flex-direction: column;
            gap: 28px;
            max-width: 900px;
            margin-top: 20px;
        }

        .eyebrow {
            font-size: 19px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            color: oklch(0.62 0.14 70);
            line-height: 1;
        }

        .tagline {
            font-family: "Shippori Mincho", serif;
            font-weight: 600;
            font-size: 104px;
            line-height: 1.0;
            letter-spacing: -0.022em;
            color: oklch(0.14 0.004 250);
            margin: 0;
        }
        .tagline .accent {
            color: oklch(0.62 0.14 70);
        }
        .tagline .accent-brush {
            font-family: "Kashima Brush", "Shippori Mincho", serif;
            font-weight: 400;
            color: oklch(0.62 0.14 70);
            letter-spacing: 0;
            font-size: 1.05em;
        }

        .sub {
            font-size: 28px;
            font-weight: 400;
            color: oklch(0.40 0.004 250);
            line-height: 1.42;
            max-width: 820px;
            letter-spacing: -0.002em;
        }

        /* Bottom row: url + tech badge */
        .footer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 32px;
            position: relative;
            z-index: 2;
            padding-bottom: 8px;
        }
        .footer-url {
            font-family: "JetBrains Mono", monospace;
            font-size: 24px;
            color: oklch(0.30 0.004 250);
            letter-spacing: 0.02em;
            font-weight: 500;
        }
        .footer-tags {
            display: flex;
            gap: 14px;
        }
        .tag {
            padding: 8px 16px;
            border-radius: 999px;
            background: oklch(1 0 0 / 0.7);
            border: 1px solid oklch(0.62 0.14 70 / 0.35);
            color: oklch(0.30 0.004 250);
            font-size: 19px;
            font-weight: 500;
            letter-spacing: 0.01em;
            backdrop-filter: blur(4px);
        }
        .tag .tag-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: oklch(0.78 0.13 75);
            box-shadow: 0 0 8px oklch(0.78 0.13 75 / 0.7);
            margin-right: 10px;
            transform: translateY(-2px);
        }

        /* Bottom kintsugi gold-seam gradient signature */
        .footer-gradient {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 140px;
            background: linear-gradient(180deg,
                transparent 0%,
                oklch(0.78 0.13 75 / 0.06) 30%,
                oklch(0.72 0.13 75 / 0.18) 65%,
                oklch(0.62 0.14 70 / 0.40) 100%);
            pointer-events: none;
            z-index: 0;
        }
        .footer-seam {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 4px;
            background: linear-gradient(90deg,
                transparent 0%,
                oklch(0.78 0.13 75 / 0.5) 12%,
                oklch(0.78 0.13 75) 50%,
                oklch(0.78 0.13 75 / 0.5) 88%,
                transparent 100%);
            box-shadow: 0 0 28px oklch(0.78 0.13 75 / 0.5);
            z-index: 1;
        }

        /* Thin vertical seam decoration on the left edge */
        .side-seam {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 280px;
            background: linear-gradient(180deg,
                transparent 0%,
                oklch(0.78 0.13 75 / 0.5) 30%,
                oklch(0.72 0.13 75 / 0.8) 50%,
                oklch(0.78 0.13 75 / 0.5) 70%,
                transparent 100%);
            border-radius: 2px;
            filter: drop-shadow(0 0 6px oklch(0.78 0.13 75 / 0.45));
            z-index: 0;
        }
    </style>
</head>
<body>
    <span class="kanji-watermark" aria-hidden="true">金</span>
    <span class="side-seam" aria-hidden="true"></span>

    <div class="brand">
        <span class="brand-mark" aria-hidden="true">金</span>
        <span class="brand-name">Kintsugi</span>
    </div>

    <div class="content">
        <span class="eyebrow">EIP-7702 wallet rescue · Open source</span>
        <h1 class="tagline">Mend the wallet.<br><span class="accent">Keep the gold.</span></h1>
        <p class="sub">Atomic, sweeper-proof rescue. One Type-4 transaction. Tokens, NFTs, and ENS — all in the same block.</p>
    </div>

    <div class="footer-row">
        <span class="footer-url">kintsugi.ophelios.com</span>
        <div class="footer-tags">
            <span class="tag"><span class="tag-dot"></span>MIT-licensed</span>
            <span class="tag"><span class="tag-dot"></span>No fees</span>
        </div>
    </div>

    <div class="footer-gradient" aria-hidden="true"></div>
    <div class="footer-seam" aria-hidden="true"></div>
</body>
</html>
